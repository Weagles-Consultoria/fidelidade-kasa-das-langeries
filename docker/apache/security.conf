<Directory "/var/www/html">
    Options -Indexes

    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>
</Directory>

<LocationMatch "^/(?:includes|vendor|cron|tools|tests|docker|storage|scripts|scratch|backups|docs|php)(?:/|$)">
    Require all denied
</LocationMatch>

<LocationMatch "^/api/src(?:/|$)">
    Require all denied
</LocationMatch>

<LocationMatch "^/(?:migrate|seed|seed_bi|seed_bi_cleanup|seed_inatividade|test_logs|test_status|temp_webhook|oauth_callback|install|setup_inicial|run_migration|run_migration_external_id)\.php$">
    Require all denied
</LocationMatch>

<LocationMatch "^/api/(?:debug|test_db|admin_shared)\.php$">
    Require all denied
</LocationMatch>

<LocationMatch "^/(?:README\.md|CLIENT_CONTEXT\.md|composer\.json|composer\.lock|docker-compose\.yml|Dockerfile|entrypoint\.sh|Procfile|uploads\.ini|\.gitignore)$">
    Require all denied
</LocationMatch>

<LocationMatch "^/.*\.(?:sql|dump|env|ini|log|sh|bak|dist)$">
    Require all denied
</LocationMatch>
